# Verified against source, 2026-07-20: github.com/cline/cline
# (commit cabeb61036561b83b857d34fe1089460b04485a8).
# apps/vscode/src/core/storage/skill-directories.ts getSkillsDirectoriesForScan()
# lists four project-relative roots (.clinerules/skills, .cline/skills,
# .claude/skills, .agents/skills) and two global roots (~/.cline/skills,
# ~/.agents/skills); docs/customization/skills.mdx documents the first
# three project dirs and ~/.cline/skills but omits the .agents/skills
# pair, which only the source confirms.
# apps/vscode/src/core/context/instructions/user-instructions/skills.ts
# scanSkillsDirectory() does fs.readdir(dirPath) one level to find skill
# subfolders, then loadSkillMetadata() looks for exactly
# `<skillDir>/SKILL.md` -- equivalent to a `*/SKILL.md` glob, not an
# arbitrary-depth walk -- so recursive = false.
# discoverSkills()/getAvailableSkills() push project skills first, then
# disk-global, then remote/enterprise, and dedupe by iterating the array
# backwards so later entries win; docs/customization/skills.mdx confirms
# in prose: "When a global skill and project skill have the same name,
# the global skill takes precedence." One entry wins outright -- the
# shadowed project skill is dropped from getAvailableSkills(), not kept
# visible alongside it.
[[harness]]
id = "cline"
display_name = "Cline"
paths_verified = true
precedence_verified = true
detect = [".clinerules", "~/.cline"]
project_paths = [".clinerules/skills", ".cline/skills", ".claude/skills", ".agents/skills"]
global_paths = ["~/.cline/skills", "~/.agents/skills"]
search_order = "global-first"
recursive = false
root_md_paths = []
mcp_global_configs = ["~/Library/Application Support/Code/User/globalStorage/saoudrizwan.claude-dev/settings/cline_mcp_settings.json"]

